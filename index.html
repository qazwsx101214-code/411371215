<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人網站 | MVP Version</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <section id="hero" class="hero">
        <div class="container">
            <h1>我是 [您的姓名]</h1>
            <p class="subtitle">致力於打造高效、簡潔且具備商業價值的數位解決方案。</p>
            <div class="button-group">
                <a href="#about" class="btn btn-primary">View Work</a>
                <a href="#contact" class="btn btn-secondary">Contact Me</a>
            </div>
        </div>
    </section>

    <section id="about" class="about">
        <div class="container">
            <h2 class="section-title">About Me</h2>
            <p>你好！我是 [您的姓名]。目前專注於 [您的領域，如：前端開發/數據分析]。</p>
            <p>我相信科技應服務於人，並熱衷於透過程式解決複雜的問題。在這裡，我記錄我的專案與學習心得。</p>
        </div>
    </section>

    <section id="contact" class="contact">
        <div class="container">
            <h2 class="section-title">Contact</h2>
            <p>歡迎隨時與我聯繫，討論合作或技術交流。</p>
            <div class="contact-links">
                <a href="mailto:your-email@example.com">Email</a>
                <a href="https://github.com/your-username" target="_blank">GitHub</a>
                <a href="https://linkedin.com/in/your-username" target="_blank">LinkedIn</a>
            </div>
        </div>
    </section>

    <script src="js/script.js"></script>
</body>
</html>
